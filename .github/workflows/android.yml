name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # تحديث لـ v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4 # تحديث لـ v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3 # الأداة الرسمية المحدثة للـ Gradle
      with:
        gradle-version: 8.2
        cache-disabled: true 

    - name: Build with Gradle
      run: gradle assembleDebug --no-build-cache --stacktrace

    # تحديث الأداة السحرية للنسخة v4 لاستخراج الـ APK بنجاح
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4 # تم التحديث هنا إلى v4
      with:
        name: SpeedLimiter-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
