name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        # تم حذف سطر الـ cache تماماً من هنا ليتخطى عطل سيرفرات GitHub

    - name: Setup Gradle
      uses: gradle/gradle-command-action@v2
      with:
        gradle-version: 8.2
        # إجبار الأداة على عدم استخدام أو حفظ الكاش
        cache-disabled: true 

    - name: Build with Gradle
      run: gradle assembleDebug --no-build-cache --stacktrace
