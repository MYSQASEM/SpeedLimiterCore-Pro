name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-command-action@v2
      with:
        gradle-version: 8.2
        cache-disabled: true 

    - name: Build with Gradle
      run: gradle assembleDebug --no-build-cache --stacktrace

    # هذه هي الخطوة السحرية الجديدة لاستخراج ملف الـ APK للتحميل
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: SpeedLimiter-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
